name: Actualizar Cuadro de Mando

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # Objetivo: ~20:05 Madrid. GitHub cron es UTC fijo → dos slots (CEST/CET).
    - cron: '05 18 * * *'   # 20:05 CEST (mar–oct)
    - cron: '05 19 * * *'   # 20:05 CET  (oct–mar)
    # Reintentos escalonados si el correo ERP llega tarde o GitHub retrasa el cron.
    - cron: '20 18 * * *'   # +15 min (verano)
    - cron: '20 19 * * *'   # +15 min (invierno)
    - cron: '35 18 * * *'   # +30 min (verano)
    - cron: '35 19 * * *'   # +30 min (invierno)
    - cron: '50 18 * * *'   # +45 min (verano)
    - cron: '50 19 * * *'   # +45 min (invierno)
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: actualizar-cuadro-pinturas
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 40

      - name: Omitir si ya se publicó hoy en ventana vespertina (idempotencia)
        id: guard
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Ejecución manual: siempre corre."
            exit 0
          fi
          HOY=$(TZ=Europe/Madrid date +%Y-%m-%d)
          HOY_TXT=$(TZ=Europe/Madrid date +%d/%m/%Y)
          YA=no
          while IFS='|' read -r subj ts; do
            [[ "$subj" != Auto\ * ]] && continue
            madrid_date=$(TZ=Europe/Madrid date -d "$ts" +%Y-%m-%d)
            madrid_hour=$(TZ=Europe/Madrid date -d "$ts" +%H)
            if [[ "$madrid_date" == "$HOY" && "$madrid_hour" -ge 18 ]]; then
              YA=yes
              break
            fi
          done < <(git log -40 --pretty=format:'%s|%cI')
          if [[ "$YA" == "yes" ]]; then
            echo "Ya publicado hoy en ventana vespertina ($HOY_TXT). Se omite este disparo programado."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Sin publicación vespertina de hoy ($HOY_TXT). Se ejecuta actualización."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Instalar Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar librerías
        if: steps.guard.outputs.skip != 'true'
        run: pip install openpyxl

      - name: Ejecutar script de actualización
        if: steps.guard.outputs.skip != 'true'
        env:
          TZ: Europe/Madrid
          GMAIL_EMAIL:      ${{ secrets.GMAIL_EMAIL }}
          GMAIL_PASSWORD:   ${{ secrets.GMAIL_PASSWORD }}
          GITHUB_TOKEN_HP:  ${{ secrets.GH_TOKEN_HP }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_USUARIO:   civcomercial2010-cmyk
          GITHUB_REPO:      cuadromandohpinturas
        run: python actualizar_gha.py

      - name: Comprobar que el cuadro publicado es V2
        if: steps.guard.outputs.skip != 'true'
        run: |
          grep -q 'id="page-ceo"' cuadro_mando.html || (echo "ERROR: cuadro_mando.html no es V2" && exit 1)
          grep -q 'Cuadro de Mando V2' cuadro_mando.html || (echo "ERROR: falta marca V2" && exit 1)
          grep -q 'AUTO_DATA_INJECT' cuadro_mando.html || (echo "ERROR: faltan datos inyectados" && exit 1)

      - name: Verificar publicación en GitHub Pages
        if: steps.guard.outputs.skip != 'true'
        run: |
          HOY=$(TZ=Europe/Madrid date +%d/%m/%Y)
          for i in 1 2 3 4 5; do
            BODY=$(curl -fsSL "https://civcomercial2010-cmyk.github.io/cuadromandohpinturas/cuadro_mando.html" || true)
            if echo "$BODY" | grep -q "actualizado.*$HOY"; then
              echo "OK Pages refleja actualización de hoy ($HOY)."
              exit 0
            fi
            echo "Esperando propagación Pages (intento $i)..."
            sleep 15
          done
          echo "AVISO: Pages aún no muestra fecha de hoy; el commit en repo puede estar correcto."
